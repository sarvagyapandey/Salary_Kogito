quarkus.kogito.devservices.enabled=false
quarkus.kogito.data-index.devservices.enabled=false
# Force GraphQL endpoint path
quarkus.smallrye-graphql.root-path=/graphql
quarkus.http.cors=true
# Allow common local dev origins
quarkus.http.cors.origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000
# Permit typical GraphQL/Apollo custom headers
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,apollographql-client-name,apollographql-client-version
quarkus.http.cors.methods=GET,POST,OPTIONS
# Needed when requests include credentials/authorization
quarkus.http.cors.access-control-allow-credentials=true
